  <style>
    :root {
      --bg: #0f172a; --card: rgba(17, 28, 51, .85); --card-solid: #111c33;
      --muted: #93a4c7; --text: #e8eefc; --accent: #60a5fa;
      --border: rgba(255, 255, 255, .10); --danger: #ef4444; --dangerBg: rgba(239, 68, 68, .12);
      --gold: #fbbf24; --green: #34d399; --blue: #60a5fa; --selected-bg: rgba(251, 191, 36, 0.1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top right, rgba(96, 165, 250, 0.12), transparent 50%), 
                  radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.08), transparent 50%), 
                  var(--bg);
      color: var(--text); padding: calc(env(safe-area-inset-top, 0px) + 24px) 20px 80px 20px;
      -webkit-user-select: none; user-select: none;
    }

    input, select, .mono, .value { -webkit-user-select: text; user-select: text; }

    .wrap { max-width: 980px; margin: 0 auto; }
    
    .top-nav { max-width: 980px; margin: 0 auto 10px auto; display: flex; justify-content: space-between; align-items: center; }
    .home-link { text-decoration: none; color: var(--accent); font-weight: bold; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
    
    header { display: flex; gap: 14px; align-items: center; margin-bottom: 18px; }
    .title h1 { font-size: 24px; margin: 0; color: #fff; font-weight: 800; }

    .card { background: var(--card-solid); border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, .25); margin-bottom: 20px; }
    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .col { flex: 1; }

    label { color: var(--muted); font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 4px; letter-spacing: 0.5px; }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255, 255, 255, .04); color: var(--text); outline: none; font-size: 15px; font-weight: bold; }
    select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background-color: rgba(255, 255, 255, .04); color: var(--text); outline: none; font-size: 15px; font-weight: bold; appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2393a4c7%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 12px auto; }
    select option { background-color: #ffffff; color: #000000; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(96, 165, 250, .20); }

    .chk-label { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text); cursor: pointer; }
    .chk-label input { width: 20px; height: 20px; margin: 0; accent-color: var(--accent); }

    .btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(251, 191, 36, .5); background: rgba(251, 191, 36, .15); color: var(--gold); font-weight: 700; text-transform: uppercase; font-size: 15px; cursor: pointer; margin-top: 8px; transition: 0.2s; }
    .btn:active { background: rgba(251, 191, 36, .3); }
    .hidden { display: none !important; }

    .container-wide { max-width: 980px; margin: 0 auto; }

    <div class="row" id="tour-st-1" style="margin-bottom: 0;">

        </div>

      <div id="optMetropoli" class="bonus-area">
        <div class="row" style="margin:0">
          <div class="col">
            <label style="color:#fff">Livello Accademia (1-30)</label>
            <select id="selMetropoliLvl" onchange="forceRecalc()"></select>
          </div>
        </div>
        <div style="margin-top:8px">
          <label class="chk-label"><input type="checkbox" id="chkManovra" onchange="forceRecalc()"> <span>Manovra di fianco (+10%)</span></label>
        </div>
        <div class="section-separator">
          <span class="sec-title">Eventi Speciali</span>
          <select id="selEventMetropoli" onchange="forceRecalc()"><option value="0">Nessuno</option><option value="100">🚀 Velocità 100%</option></select>

    <div class="bounce-window-config" id="tour-st-4" style="margin-bottom: 0;">
      <label style="text-transform:none; line-height:1.2; margin-bottom:8px; color:var(--text)">Finestra di Rientro (Minuti prima della fine del turno)</label>
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="flex:1">
          <label>Da (Min prima)</label>
          <select id="selBounceMax" onchange="updateBounceLimits()"></select>
        </div>
        <div style="flex:1">
          <label>A (Min prima)</label>

        </div>
      </div>
    </div>
    
    <div class="row" id="tour-st-5" style="margin-bottom: 0;">
      <div class="col" style="flex:2"><label>Truppa</label><select id="selTroop"></select></div>
      <div class="col"><label>Plotone</label><select id="selBatch"></select></div>
    </div>

    <div class="row" id="tour-st-6" style="margin-bottom: 0;">
      <div style="width:100%">
        <div style="margin-bottom:8px;">
          <label class="chk-label" style="font-weight:bold; color:var(--gold); display: inline-flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="chkDelay" onchange="syncDelay('chkDelay')">

    <button class="btn btn-primary" onclick="startCalc()" id="tour-st-7">CALCOLA</button>

  <div id="resArea" class="hidden card container-wide" style="padding:0; overflow:hidden;">
    <div id="resHeaderInfo" class="res-header-info"></div>

    <div class="quick-bar">

      <div id="delay-res-container" style="display:flex; align-items:center; margin-left:auto;">
        <label class="chk-label" style="font-weight:bold; color:var(--gold); display: inline-flex; align-items:center; gap: 5px; cursor: pointer; font-size: 11px; padding: 4px 8px; background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); border-radius: 6px;">

  <script>
    if (typeof window.parseLK === 'undefined') {
        window.parseLK = function(val) {
            let m = val.match(/x=([0-9]+).*?y=([0-9]+)/i) || val.match(/([0-9]+),([0-9]+)/);
            if(m) return { x: parseInt(m[1]), y: parseInt(m[2]), w: val.split('&')[1] || "337" };
            return null;
        }
    }

    let GAME_DATA = null;
    let myCastle = null, worldId = "337"; 
    let rows = [], ticker = null;

    async function loadGameData() {
      try {
        let response = await fetch('/lord-knighttools/database_truppe.json?v=' + Date.now());
        if (!response.ok) throw new Error("HTTP Error");
        const json = await response.json();
        GAME_DATA = (json && json.game_config) ? json.game_config : json;
        initUI();
      } catch (e) {
        console.error(e);
        alert("Errore database truppe: " + e.message);
      }
    }

    const TROOPS_UI = [
      { key: "Lanciere" }, { key: "Balestriere" }, { key: "Cav. Pesante" }, { key: "Spadaccino" },
      { key: "Arciere" }, { key: "Cav. Leggero" }, { key: "Carro bue" }, { key: "Ashigaru" },
      { key: "Berserker" }, { key: "Arc. Daikyu" }, { key: "Arc. Norreno" }, { key: "Cav. Ascia" }
    ];

    window.onload = () => { loadGameData(); };

    function initUI() {
      let htmlT = "";
      TROOPS_UI.forEach(t => { htmlT += `<option value="${t.key}">${t.key}</option>`; });
      let st = document.getElementById('selTroop'); if(st) st.innerHTML = htmlT;
      let sbt = document.getElementById('selBattleTroop'); if(sbt) sbt.innerHTML = htmlT;

      let htmlL = "";
      for (let i = 1; i <= 30; i++) htmlL += `<option value="${i}">Livello ${i}</option>`;
      document.getElementById('selCityLvl').innerHTML = htmlL;
      document.getElementById('selMetropoliLvl').innerHTML = htmlL;

      const countryMultipliers = [0.90, 0.89, 0.88, 0.87, 0.86, 0.85, 0.84, 0.83, 0.82, 0.81, 0.80, 0.79, 0.78, 0.77, 0.76, 0.74, 0.72, 0.69, 0.65, 0.60];
      let htmlCB = `<option value="1">Nessuno (100%)</option>`;
      countryMultipliers.forEach((val, i) => { htmlCB += `<option value="${val}">Livello ${i + 1} (${Math.round(val * 100)}%)</option>`; });
      document.getElementById('selCountryBonus').innerHTML = htmlCB;

      let htmlMax = "";
      for (let i = 9; i >= 1; i--) { htmlMax += `<option value="${i}">${i} min</option>`; }
      let sbm = document.getElementById('selBounceMax'); if(sbm) { sbm.innerHTML = htmlMax; sbm.value = "6"; }

      updateBounceLimits(true);
      updateUI();
    }

    function updateBounceLimits(isInit = false) {
      let maxEl = document.getElementById('selBounceMax');
      let minSel = document.getElementById('selBounceMin');
      let maxVal = parseInt(maxEl.value);
      let currentMin = isInit ? 3 : parseInt(minSel.value || "3");

      minSel.innerHTML = "";
      for (let i = maxVal; i >= 1; i--) {
        let opt = document.createElement('option'); opt.value = i; opt.text = `${i} min`; minSel.appendChild(opt);
      }
      if (currentMin <= maxVal) { minSel.value = currentMin; } else { minSel.value = maxVal; }
      if (!isInit) forceRecalc();
    }

    function extractWorld() {
      let val = document.getElementById('inCoord').value;
      let lk = window.parseLK(val);
      if (lk && lk.w) {
        worldId = lk.w;
        if (worldId === "327") document.getElementById('areaBonusPaese').classList.add('active');
        else { document.getElementById('areaBonusPaese').classList.remove('active'); document.getElementById('selCountryBonus').value = "1"; }
      }
    }

    function updateUI() {
      if (!GAME_DATA) return;
      let habRadio = document.querySelector('input[name="hab"]:checked');
      let hab = habRadio ? habRadio.value : 'castello';
      
      document.querySelectorAll('.bonus-area').forEach(el => el.classList.remove('active'));
      let elArea = document.getElementById('opt' + hab.charAt(0).toUpperCase() + hab.slice(1));
      if(elArea) elArea.classList.add('active');

      let batchSelect = document.getElementById('selBatch');
      if (batchSelect && GAME_DATA.habitats && GAME_DATA.habitats[hab] && GAME_DATA.habitats[hab].batches) {
        let v = batchSelect.value;
        batchSelect.innerHTML = "";
        GAME_DATA.habitats[hab].batches.forEach(val => {
          let opt = document.createElement('option'); opt.value = val; opt.innerText = val; batchSelect.appendChild(opt);
        });
        if(v) batchSelect.value = v;
      }
    }

    function getSpeed(troopKey) {
      if (!GAME_DATA || !GAME_DATA.troops_base_seconds) return 0;
      let base = GAME_DATA.troops_base_seconds[troopKey] || 0;
      let habRadio = document.querySelector('input[name="hab"]:checked');
      let hab = habRadio ? habRadio.value : 'castello';
      
      let factor = 1.0;
      if(GAME_DATA.habitats && GAME_DATA.habitats[hab]) {
         factor = GAME_DATA.habitats[hab].base_multiplier || 1.0;
         if (hab === 'castello') {
           let chk = document.getElementById('chkMap'), evt = document.getElementById('selEventCastello');
           if (chk && chk.checked) factor *= 0.95; if (evt && evt.value === "100") factor *= 0.5;
         }
         else if (hab === 'fortezza') {
           let chk = document.getElementById('chkBussola'), evt = document.getElementById('selEventFortezza');
           if (chk && chk.checked) factor *= 0.95; if (evt && evt.value === "100") factor *= 0.5;
         }
         else if (hab === 'citta') {
           let lvl = document.getElementById('selCityLvl'), evt = document.getElementById('selEventCitta');
           if(lvl) factor *= GAME_DATA.habitats[hab].building_levels[parseInt(lvl.value)] || 1.0; if (evt && evt.value === "100") factor *= 0.5;
         }
         else if (hab === 'metropoli') {
           let lvl = document.getElementById('selMetropoliLvl'), chk = document.getElementById('chkManovra'), evt = document.getElementById('selEventMetropoli');
           if(lvl) factor *= GAME_DATA.habitats[hab].building_levels[parseInt(lvl.value)] || 1.0; if (chk && chk.checked) factor *= 0.90; if (evt && evt.value === "100") factor *= 0.5;
         }
      }
      let selCB = document.getElementById('selCountryBonus');
      if(selCB) factor *= parseFloat(selCB.value) || 1.0;
      return base * factor;
    }

    function syncDelay(id) {
      const v = document.getElementById(id).checked;
      let c1 = document.getElementById('chkDelay'); if(c1) c1.checked = v; 
      let c2 = document.getElementById('chkDelayRes'); if(c2) c2.checked = v;
      forceRecalc();
    }

    function forceRecalc() {
      if (rows.length > 0) renderList();
    }

    function startCalc() {
      let lk = window.parseLK(document.getElementById('inCoord').value);
      if (!lk || lk.x === undefined || lk.y === undefined) return alert("Inserisci un link castello valido!");
      
      myCastle = { x: parseInt(lk.x), y: parseInt(lk.y) };
      let dVal = document.getElementById('inDate').value, tVal = document.getElementById('inTime').value;
      if (!dVal || !tVal) return alert("Inserisci data e ora!");
      let startT = new Date(dVal + "T" + tVal);
      if (startT < new Date(Date.now() - 60000)) return alert("Data nel passato!");
      
      let garrison = parseInt(document.getElementById('inGarrison').value);
      if (!garrison || garrison < 100) return alert("Inserisci un numero valido di truppe!");

      let batch = parseInt(document.getElementById('selBatch').value);
      let turn1_troops = batch * 2; 
      let available = garrison - turn1_troops;

      document.getElementById('selBattleTroop').value = document.getElementById('selTroop').value;

      document.getElementById('inputArea').classList.add('hidden');
      document.getElementById('resArea').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });

      let turn1End = new Date(startT.getTime() + 600000);
      rows = [{ t: turn1End, type: 'garrison', turnNum: 1, covered: true, open: false }];

      let step = 2; 
      while (available >= batch && step < 50) {
        let turnEndTime = new Date(startT.getTime() + (step * 600000));
        rows.push({ t: turnEndTime, type: 'wave', turnNum: step, covered: false, open: false });
        available -= batch; step++;
      }

      if (ticker) clearInterval(ticker);
      ticker = setInterval(loop, 1000);
      renderList();
    }

    // --- MOTORE MATEMATICO ALLA CIECA ---
    function generateBlindTargets(turnEndTime, speed) {
        let now = Date.now();
        let minOff = parseInt(document.getElementById('selBounceMin').value || "3");
        let maxOff = parseInt(document.getElementById('selBounceMax').value || "6");
        let rStart = turnEndTime.getTime() - (maxOff * 60000);
        let rEnd = turnEndTime.getTime() - (minOff * 60000);

        let targetReturn = (rStart + rEnd) / 2;
        
        let isDelayEnabled = document.getElementById('chkDelay').checked;
        let delayMultiplier = isDelayEnabled ? 1.05 : 1.0; 
        
        let travelTime = (targetReturn - now) / (1 + delayMultiplier); 
        let dist = Math.round(travelTime / (speed * 1000));
        
        let minTravel = rStart - now;
        if (minTravel < 0) return null; 
        if (dist < 1) return null; 

        let cx = myCastle.x;
        let cy = myCastle.y;
        
        let points = [
            { x: cx + dist, y: cy },
            { x: cx - dist, y: cy },
            { x: cx, y: cy + dist },
            { x: cx, y: cy - dist },
            { x: cx + Math.round(dist * 0.7), y: cy + Math.round(dist * 0.7) }
        ];
        
        points = points.map(p => ({ x: Math.max(0, p.x), y: Math.max(0, p.y) }));
        return { dist: dist, points: points };
    }

    function renderList() {
      let el = document.getElementById('resList'); if(!el) return;
      
      let dVal = document.getElementById('inDate').value, tVal = document.getElementById('inTime').value;
      let startT = new Date(dVal + "T" + tVal);
      let linkUrl = `l+k://coordinates?${myCastle.x},${myCastle.y}&${worldId}`;
      let pD = (n) => String(n).padStart(2, '0');
      
      document.getElementById('resHeaderInfo').innerHTML = `<b>⚔️ Tuo Castello</b><a href="${linkUrl}">${linkUrl}</a><span style="font-size:12px;color:#aaa;display:block;margin-top:4px;">Inizio: ${pD(startT.getDate())}/${pD(startT.getMonth() + 1)} ${pD(startT.getHours())}:${pD(startT.getMinutes())}</span>`;

      el.innerHTML = "";
      rows.forEach((r, i) => {
        let isGarrison = r.type === 'garrison';
        let label = `Turno ${r.turnNum}`;
        let colTime = `<div class="col-time"><div class="t-label">${label}</div><div class="t-val">${pD(r.t.getHours())}:${pD(r.t.getMinutes())}</div></div>`;

        let divRow = document.createElement('div');
        divRow.className = "res-row" + (r.covered ? " covered" : "");
        divRow.id = `row_${i}`;
        
        if (!isGarrison) {
            divRow.onclick = () => toggleAccordion(i);
        }

        if (isGarrison) {
            divRow.innerHTML = `${colTime}<div class="col-info" style="color:var(--green);font-weight:bold;">Guarnigione fissa</div><div class="col-action"></div>`;
            el.appendChild(divRow);
        } else {
            divRow.innerHTML = `${colTime}<div class="col-info" id="info_${i}"></div><div class="col-action" id="act_${i}"></div>`;
            el.appendChild(divRow);

            let bodyDiv = document.createElement('div');
            bodyDiv.id = `body_${i}`;
            bodyDiv.className = "st-body";
            el.appendChild(bodyDiv);

            updateRowData(i, true);
        }
      });
    }

    function loop() {
      rows.forEach((r, i) => {
        if (r.type !== 'garrison') updateRowData(i, false);
      });
    }

    function updateRowData(i, forceRenderBody) {
      let r = rows[i];
      let infoDiv = document.getElementById(`info_${i}`);
      let actDiv = document.getElementById(`act_${i}`);
      let bodyDiv = document.getElementById(`body_${i}`);
      if (!infoDiv || !actDiv || !bodyDiv) return;

      if (r.covered) {
          infoDiv.innerHTML = `<span class="st-covered-text">COPERTO</span>`;
          actDiv.innerHTML = `<div class="btn-scopri" onclick="event.stopPropagation(); uncovRow(${i})">SCOPRI</div>`;
          bodyDiv.className = "st-body"; 
          return;
      }

      let speed = getSpeed(document.getElementById('selBattleTroop').value);
      let targetData = generateBlindTargets(r.t, speed);

      if (!targetData) {
          infoDiv.innerHTML = `<div class="info-status st-wait">SCADUTO</div>`;
          actDiv.innerHTML = ``;
          bodyDiv.className = "st-body";
          return;
      }

      infoDiv.innerHTML = `<div class="info-status st-now">PRONTO</div>`;
      actDiv.innerHTML = `<span style="color:#aaa; font-size:16px; font-weight:bold; cursor:pointer;">${r.open ? '▲' : '▼'}</span>`;

      if (r.open) {
          bodyDiv.className = "st-body open";
          
          let now = Date.now();
          let baseOneWay = targetData.dist * speed * 1000;
          let isDelayEnabledGlobal = document.getElementById('chkDelay').checked;
          
          let minOff = parseInt(document.getElementById('selBounceMin').value || "3");
          let maxOff = parseInt(document.getElementById('selBounceMax').value || "6");
          let rStart = r.t.getTime() - (maxOff * 60000);
          let rEnd = r.t.getTime() - (minOff * 60000);

          let impactStart = new Date(rStart - baseOneWay);
          let impactEnd = new Date(rEnd - baseOneWay);
          let pD = (n) => String(n).padStart(2, '0');
          let bStr = `${pD(impactStart.getHours())}:${pD(impactStart.getMinutes())}:${pD(impactStart.getSeconds())} - ${pD(impactEnd.getHours())}:${pD(impactEnd.getMinutes())}:${pD(impactEnd.getSeconds())}`;

          let reqMinImpact = rStart - baseOneWay;
          let isDelayNeeded = (now + baseOneWay) < reqMinImpact; 
          let delayHtml = "";
          if (isDelayEnabledGlobal && isDelayNeeded) {
              delayHtml = `<span style="color:var(--gold); font-weight:bold">Ritardo Dinamico Applicato</span>`;
          } else {
              delayHtml = `<span style="color:var(--accent); font-weight:bold">Nessun Ritardo Necessario</span>`;
          }

          let linksHtml = `
              <div class="info-sub" style="margin-bottom: 12px;">
                  <span class="bounce-hl">Impatto: ${bStr}</span><br>
                  Distanza: <b>${targetData.dist}</b> campi<br>
                  ${delayHtml}
              </div>
              <div style="display: flex; flex-direction: column; gap: 8px;">
          `;

          targetData.points.forEach((p, idx) => {
              let url = `l+k://coordinates?${p.x},${p.y}&${worldId}`;
              linksHtml += `
                  <div class="target-row-generated">
                      <a href="${url}" class="link-text">${url}</a>
                      <a href="${url}" class="lnk-btn-launch" onclick="event.stopPropagation();">LANCIA</a>
                  </div>
              `;
          });
          
          linksHtml += `</div><div class="btn-copri" style="margin-top:15px;" onclick="event.stopPropagation(); covRow(${i})">SEGNA COME COPERTO</div>`;
          bodyDiv.innerHTML = linksHtml;
      } else {
          bodyDiv.className = "st-body";
      }
    }

    function toggleAccordion(i) {
      if (rows[i].covered) return;
      rows[i].open = !rows[i].open;
      renderList();
    }

    window.covRow = function(i) {
      rows[i].covered = true;
      rows[i].open = false; 
      renderList();
    };

    window.uncovRow = function(i) {
      rows[i].covered = false;
      renderList();
    };

    function reset() { 
      document.getElementById('inputArea').classList.remove('hidden'); 
      document.getElementById('resArea').classList.add('hidden'); 
      if (ticker) clearInterval(ticker); 
    }
  </script>
</body>
</html>
