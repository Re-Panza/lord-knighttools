<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Self Trick Lords & Knights | Calcolatore Difesa - Re Panza</title>
  <script src="/lord-knighttools/version.js"></script>
  <script>
    if (typeof APP_VERSION !== 'undefined') {
      document.write(`<link rel="manifest" href="/lord-knighttools/manifest.json?v=${APP_VERSION}">`);
    }
  </script>
  <link rel="apple-touch-icon" href="/lord-knighttools/icona.png">
  <link rel="stylesheet" href="/lord-knighttools/common.css">
  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --bg: #0f172a; --card-solid: #111c33; --muted: #93a4c7; --text: #e8eefc; --accent: #60a5fa;
      --border: rgba(255, 255, 255, .10); --danger: #ef4444; --gold: #fbbf24; --green: #34d399;
    }
    body {
      margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text);
      padding: 24px 20px; -webkit-user-select: none;
    }
    .card { background: var(--card-solid); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 20px; }
    .row { display: flex; gap: 10px; margin-bottom: 12px; }
    .col { flex: 1; }
    label { color: var(--muted); font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255, 255, 255, .04); color: var(--text); font-weight: bold; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(251, 191, 36, .5); background: rgba(251, 191, 36, .15); color: var(--gold); font-weight: 700; cursor: pointer; }
    .hidden { display: none !important; }
    .res-row { display: grid; grid-template-columns: 50px 1fr 90px; gap: 10px; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .st-body { display: none; padding: 15px; background: rgba(0,0,0,0.4); border-top: 1px dashed rgba(255,255,255,0.05); }
    .st-body.open { display: block; }
    .target-row-generated { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; }
    .lnk-btn-launch { padding: 5px 15px; background: rgba(251, 191, 36, 0.15); border: 1px solid var(--gold); color: var(--gold); border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: bold; }
  </style>
</head>

<body>
  <div class="top-nav"><a href="/lord-knighttools/" class="home-link">🏠 Torna alla Home</a></div>
  <div class="page-title"><h2>⚔️ Self Trick</h2></div>

  <div id="inputArea" class="card">
    <div class="row"><div class="col"><label>🎯 Link castello attaccato</label><input type="text" id="inCoord" oninput="extractWorld()"></div></div>
    <div class="row">
      <div class="col"><label>📅 Inizio Battaglia</label><input type="date" id="inDate"></div>
      <div class="col"><label>⏱️ Ora Inizio</label><input type="time" id="inTime" step="60"></div>
    </div>
    <div class="row">
      <div class="col">
        <label>Finestra Rientro (Min prima)</label>
        <div style="display:flex; gap:5px;">
          <select id="selBounceMax"><option value="6">6 min</option><option value="9">9 min</option></select>
          <select id="selBounceMin"><option value="3">3 min</option></select>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col"><label>Truppa</label><select id="selTroop"></select></div>
      <div class="col"><label>Plotone</label><select id="selBatch"></select></div>
    </div>
    <div class="row"><div class="col"><label class="chk-label"><input type="checkbox" id="chkDelay"> ⏱️ Ritardo Dinamico (5%)</label></div></div>
    <div class="row"><div class="col"><label>Truppe Totali</label><input type="number" id="inGarrison"></div></div>
    <button class="btn" onclick="startCalc()">CALCOLA</button>
  </div>

  <div id="resArea" class="hidden card" style="padding:0;">
    <div id="resHeaderInfo" style="padding:15px; text-align:center;"></div>
    <div id="resList"></div>
    <button class="btn" onclick="reset()" style="margin: 10px;">Indietro</button>
  </div>

  <script>
    let GAME_DATA = null;
    let myCastle = null, worldId = "337";
    let rows = [], ticker = null;

    async function loadGameData() {
      let response = await fetch('/lord-knighttools/database_truppe.json');
      const json = await response.json();
      GAME_DATA = json.game_config || json;
      initTroopUI();
    }

    function initTroopUI() {
      const troops = ["Lanciere", "Balestriere", "Cav. Pesante", "Spadaccino", "Arciere", "Cav. Leggero", "Carro bue"];
      let h = ""; troops.forEach(t => h += `<option value="${t}">${t}</option>`);
      document.getElementById('selTroop').innerHTML = h;
      document.getElementById('selBatch').innerHTML = "<option value='100'>100</option><option value='500'>500</option>";
    }

    function extractWorld() {
      let v = document.getElementById('inCoord').value;
      let m = v.match(/&([0-9]+)/);
      if(m) worldId = m[1];
    }

    function getSpeed() {
      let t = document.getElementById('selTroop').value;
      return GAME_DATA.troops_base_seconds[t] || 600;
    }

    function startCalc() {
      let v = document.getElementById('inCoord').value;
      let m = v.match(/x=([0-9]+).*?y=([0-9]+)/i) || v.match(/([0-9]+),([0-9]+)/);
      if(!m) return alert("Link non valido");
      myCastle = { x: parseInt(m[1]), y: parseInt(m[2]) };

      let startT = new Date(document.getElementById('inDate').value + "T" + document.getElementById('inTime').value);
      let garrison = parseInt(document.getElementById('inGarrison').value);
      let batch = parseInt(document.getElementById('selBatch').value);

      rows = [];
      let available = garrison - (batch * 2);
      rows.push({ t: new Date(startT.getTime() + 600000), type: 'garrison', turn: 1, covered: true });

      let step = 2;
      while(available >= batch && step < 30) {
        rows.push({ t: new Date(startT.getTime() + (step * 600000)), type: 'wave', turn: step, covered: false, open: false });
        available -= batch; step++;
      }

      document.getElementById('inputArea').classList.add('hidden');
      document.getElementById('resArea').classList.remove('hidden');
      ticker = setInterval(updateAll, 1000);
      renderList();
    }

    function updateAll() {
      rows.forEach((r, i) => { if(r.type === 'wave') updateRowLogic(i); });
    }

    function updateRowLogic(i) {
      let r = rows[i];
      if(r.covered) return;

      let speed = getSpeed();
      let now = Date.now();
      let winMax = parseInt(document.getElementById('selBounceMax').value);
      let winMin = parseInt(document.getElementById('selBounceMin').value);
      let isDelay = document.getElementById('chkDelay').checked;

      // Fine Turno r.t (es 08:00) -> Rientro tra r.t - 6m e r.t - 3m
      let rStart = r.t.getTime() - (winMax * 60000);
      let rEnd = r.t.getTime() - (winMin * 60000);

      let found = null;
      for(let d=1; d<=250; d++) {
        let oneWay = d * speed * 1000;
        let outward = isDelay ? oneWay * 1.05 : oneWay;
        
        let lStart = rStart - (outward + oneWay);
        let lEnd = rEnd - (oneWay + oneWay);

        if (now > lEnd) continue;
        found = { d, lStart, lEnd, rStart, rEnd, oneWay };
        break;
      }

      let info = document.getElementById(`info_${i}`);
      let act = document.getElementById(`act_${i}`);
      let body = document.getElementById(`body_${i}`);

      if(!found) {
        info.innerHTML = "<span class='st-wait'>SCADUTO</span>";
        act.innerHTML = "";
        return;
      }

      if(now < found.lStart) {
        let diff = found.lStart - now;
        let m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
        info.innerHTML = `<span class='st-wait'>In attesa... ${m}m ${s}s</span>`;
        act.innerHTML = "▼";
        body.innerHTML = ""; 
      } else {
        info.innerHTML = "<span class='st-now'>PRONTO</span>";
        act.innerHTML = r.open ? "▲" : "▼";
        if(r.open) renderLinks(i, found);
      }
    }

    function renderLinks(i, data) {
      let body = document.getElementById(`body_${i}`);
      if(body.innerHTML !== "") return;

      let h = `<div class='info-sub'>Distanza: ${data.d} campi | Impatto stimato: ${new Date(data.rStart - data.oneWay).toLocaleTimeString()}</div>`;
      [ [1,0], [-1,0], [0,1], [0,-1], [1,1] ].forEach(offset => {
        let nx = myCastle.x + (offset[0]*data.d), ny = myCastle.y + (offset[1]*data.d);
        let url = `l+k://coordinates?${nx},${ny}&${worldId}`;
        h += `<div class='target-row-generated'><span style='font-size:10px'>${url}</span><a href='${url}' class='lnk-btn-launch' onclick='cov(${i})'>LANCIA</a></div>`;
      });
      h += `<button class='btn' onclick='cov(${i})' style='margin-top:10px'>SEGNA COME COPERTO</button>`;
      body.innerHTML = h;
    }

    function renderList() {
      let l = document.getElementById('resList'); l.innerHTML = "";
      rows.forEach((r, i) => {
        let row = document.createElement('div');
        row.className = "res-row" + (r.covered ? " covered" : "");
        row.onclick = () => { if(!r.covered) { r.open = !r.open; document.getElementById(`body_${i}`).classList.toggle('open'); }};
        
        let timeStr = r.t.getHours().toString().padStart(2,'0') + ":" + r.t.getMinutes().toString().padStart(2,'0');
        row.innerHTML = `<div class='col-time'><div class='t-label'>T${r.turn}</div><div class='t-val'>${timeStr}</div></div><div class='col-info' id='info_${i}'></div><div class='col-action' id='act_${i}'></div>`;
        l.appendChild(row);

        let body = document.createElement('div'); body.id = `body_${i}`; body.className = "st-body";
        l.appendChild(body);
      });
    }

    window.cov = (i) => { rows[i].covered = true; renderList(); };
    window.reset = () => { clearInterval(ticker); document.getElementById('inputArea').classList.remove('hidden'); document.getElementById('resArea').classList.add('hidden'); };
    loadGameData();
  </script>
</body>
</html>
